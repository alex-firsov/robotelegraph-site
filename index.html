<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robotelegraph</title>
<meta name="description" content="A daily digest on robotics. All the day's robot news in one email.">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#fff; color:#000; font-family:Georgia,"Times New Roman",serif; }
  .wrap { max-width:520px; margin:0 auto; padding:120px 24px 80px; }
  .mark { font-family:Helvetica,Arial,sans-serif; font-size:13px; letter-spacing:5px; margin-bottom:72px; }
  p { font-size:17px; line-height:1.75; margin-bottom:28px; }
  form { display:flex; gap:16px; align-items:baseline; margin:56px 0 12px; }
  input[type=email] { flex:1; min-width:0; padding:6px 0; font:inherit; font-size:16px; border:0; border-bottom:1px solid #000; outline:none; background:#fff; color:#000; }
  input::placeholder { color:#000; opacity:.3; }
  button { font-family:Helvetica,Arial,sans-serif; font-size:13px; letter-spacing:2px; background:none; border:0; cursor:pointer; padding:6px 0; border-bottom:1px solid #000; }
  button:hover { opacity:.5; }
  .fine { font-family:Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:1px; opacity:.45; }
  footer { margin-top:120px; font-family:Helvetica,Arial,sans-serif; font-size:12px; letter-spacing:1px; }
  footer a { color:#000; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">ROBOTELEGRAPH</div>

  <p>Robotelegraph is a daily digest on robotics. Humanoids, industrial
  robots, embodied AI, funding rounds and the research behind them —
  all the day's robot news, distilled into one email, every weekday morning.</p>

  <!-- Замените robotelegraph на ваш username в Buttondown -->
  <form action="https://buttondown.com/api/emails/embed-subscribe/robotelegraph"
        method="post" target="popupwindow"
        onsubmit="window.open('https://buttondown.com/robotelegraph', 'popupwindow')">
    <input type="email" name="email" placeholder="you@example.com" required>
    <button type="submit">SUBSCRIBE</button>
  </form>
  <p class="fine">FREE · UNSUBSCRIBE ANYTIME</p>

  <footer><a href="https://buttondown.com/robotelegraph/archive">Archive</a></footer>
</div>
</body>
</html>
